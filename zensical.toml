[project]
site_name = "coreason_deep_research"
site_url = "https://CoReason-AI.github.io/coreason_deep_research/"
repo_url = "https://github.com/CoReason-AI/coreason_deep_research"
docs_dir = "docs"
site_dir = "site"

[project.theme]
features = [
    "navigation.instant",
    "navigation.tracking",
    "navigation.tabs",
    "toc.integrate",
    "search.suggest",
    "search.highlight"
]

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
show_root_heading = true
show_bases = true
show_signature_annotations = true
